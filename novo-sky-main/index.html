<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#003459" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sky Manager" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%23003459%22/><text y=%22.75em%22 x=%225%22 font-size=%2280%22>⭐</text></svg>">
    <title>Sky Distribuidora Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // Carrega o Google Maps se houver uma chave salva
      (function() {
        const key = localStorage.getItem('sky_google_maps_key');
        if (key) {
          const script = document.createElement('script');
          script.src = `https://maps.googleapis.com/maps/api/js?key=${key}&libraries=places`;
          script.async = true;
          script.defer = true;
          document.head.appendChild(script);
        }
      })();
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⭐</text></svg>">
    <style>
      body { 
        font-family: 'Inter', sans-serif; 
        background-color: #F1F5F9; 
        margin: 0; 
        overscroll-behavior-y: contain;
        -webkit-tap-highlight-color: transparent;
        padding-top: env(safe-area-inset-top);
      }
      #root { min-height: 100vh; }
      #initial-loader {
        position: fixed; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; background: #003459; color: white; z-index: 9999;
        transition: opacity 0.5s ease;
      }
      .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #00A8E8; border-radius: 50%; animation: spin 1s linear infinite; }
      .animate-spin-slow { animation: spin 3s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes pulse-subtle {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.02); opacity: 0.95; }
      }
      .animate-pulse-subtle { animation: pulse-subtle 3s ease-in-out infinite; }
      #error-display { display: none; padding: 20px; background: #fee2e2; border: 2px solid #ef4444; color: #b91c1c; border-radius: 12px; margin: 20px; font-family: monospace; z-index: 10000; position: relative; }
      
      @media (max-width: 640px) {
        .mobile-safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
      }
    </style>
  </head>
  <body class="mobile-safe-bottom">
    <div id="error-display"></div>
    <div id="initial-loader">
      <div class="spinner"></div>
      <p style="margin-top:20px; font-weight:900; letter-spacing: 2px;">SKY MANAGER</p>
      <p style="font-size: 10px; opacity: 0.6; margin-top: 5px; font-weight: bold;">SISTEMA LOCAL-FIRST V10</p>
    </div>
    <div id="root"></div>
    <script>
      // Debug de variáveis de ambiente
      console.log("SKY MANAGER: Verificando conexão...");
      if (!window.process) window.process = { env: {} };
    </script>
    <script type="module" src="/index.tsx"></script>
    <script>
      // Fix para manter o WebApp em tela cheia no iOS ao clicar em links internos
      (function(a,b,c){if(c in b&&b[c]){var d,e=a.location,f=/^(a|html)$/i;a.addEventListener("click",function(a){d=a.target;while(!f.test(d.nodeName))d=d.parentNode;"href"in d&&(d.href.indexOf("http")||~d.href.indexOf(e.host))&&(a.preventDefault(),e.href=d.href)},!1)}})(document,window.navigator,"standalone")
    </script>
  </body>
</html>
